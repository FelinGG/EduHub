<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduHub | Wybierz Przedmiot</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/global.css">
    <style>
        body { background: var(--bg-gradient); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hub-container { width: 100%; max-width: 900px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; padding: 2rem; }
        .card { 
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-radius: 32px; padding: 3rem; 
            text-decoration: none; color: var(--text-dark); text-align: center; transition: var(--transition); 
            box-shadow: var(--card-shadow); border: 1px solid rgba(255,255,255,0.5);
        }
        .card:hover { transform: translateY(-10px); background: white; }
        .card h2 { font-size: 2rem; margin-bottom: 1rem; }
        .card-math:hover { border-bottom: 6px solid var(--accent-math); }
        .card-polish:hover { border-bottom: 6px solid var(--accent-polish); }
    </style>
</head>
<body>
    <header style="text-align: center; margin-bottom: 2rem;">
        <h1 style="font-size: 3rem; font-weight: 800;">Centrum Nauki</h1>
        <p style="color: var(--text-muted);">Wybierz drogę do sukcesu maturalnego</p>
    </header>

    <main class="hub-container">
        <a href="subjects/matematyka/index.html" class="card card-math">
            <div style="font-size: 3rem; margin-bottom: 1rem;">📐</div>
            <h2>Matematyka</h2>
            <p>Arkusze, teoria i zadania.</p>
        </a>
        <a href="subjects/polski/index.html" class="card card-polish">
            <div style="font-size: 3rem; margin-bottom: 1rem;">✍️</div>
            <h2>Język Polski</h2>
            <p>Lektury, rozprawki i ustny.</p>
        </a>
    </main>
</body>
</html>
